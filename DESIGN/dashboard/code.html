<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Personal Dashboard - Aura Nutrition</title>

<style>
        body {
            background-color: #000000; /* Level 0 base */
            color: #e2e2e2;
        }
        /* Custom progress ring styling */
        .progress-ring {
            stroke-dasharray: 251.2;
            stroke-dashoffset: 251.2;
            transition: stroke-dashoffset 1s ease-out;
        }
        .progress-ring.loaded {
            stroke-dashoffset: 56.52; /* ~77.5% full */
        }
    </style>
</head>
<body class="antialiased min-h-screen flex justify-center bg-primary-container relative pb-[80px]">
<!-- Main Container - Mobile Width Centered -->
<main class="w-full max-w-[430px] px-lg pt-xl flex flex-col gap-xl">
<!-- Header -->
<header class="flex flex-col gap-xs">
<span class="font-label-muted text-label-muted text-on-surface-variant uppercase tracking-wider">Oct 24, 2023</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-semibold tracking-tight">Good Morning, Jordan</h1>
</header>
<!-- Calorie Progress -->
<section class="flex justify-center items-center py-lg relative">
<!-- SVG Ring -->
<div class="relative w-64 h-64 flex justify-center items-center">
<svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 100 100">
<!-- Track -->
<circle cx="50" cy="50" fill="transparent" r="40" stroke="#1A1A1A" stroke-width="4"></circle>
<!-- Progress -->
<circle class="progress-ring" cx="50" cy="50" fill="transparent" r="40" stroke="#c6c6c6" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<div class="flex flex-col items-center justify-center z-10">
<span class="font-display-data text-display-data text-on-surface tracking-tighter">1,820</span>
<span class="font-label-muted text-label-muted text-on-surface-variant mt-1">/ 2,350 kcal</span>
</div>
</div>
</section>
<!-- Macros -->
<section class="bg-[#0B0B0B] border border-[#242424] rounded-xl p-lg flex flex-col gap-md">
<!-- Protein -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface uppercase">Protein</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">120g / 150g</span>
</div>
<div class="w-full h-1 bg-[#1A1A1A] rounded-full overflow-hidden">
<div class="h-full bg-on-surface rounded-full w-[80%]"></div>
</div>
</div>
<!-- Fat -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface uppercase">Fat</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">45g / 70g</span>
</div>
<div class="w-full h-1 bg-[#1A1A1A] rounded-full overflow-hidden">
<div class="h-full bg-on-surface-variant rounded-full w-[64%]"></div>
</div>
</div>
<!-- Carbs -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface uppercase">Carbs</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">210g / 250g</span>
</div>
<div class="w-full h-1 bg-[#1A1A1A] rounded-full overflow-hidden">
<div class="h-full bg-outline rounded-full w-[84%]"></div>
</div>
</div>
</section>
<!-- Meals -->
<section class="flex flex-col gap-sm pb-xl">
<!-- Breakfast -->
<div class="bg-[#0B0B0B] border border-[#242424] rounded-lg p-md flex justify-between items-center hover:border-surface-tint/15 transition-colors cursor-pointer">
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface">Breakfast</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">3 items</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">420 kcal</span>
</div>
<!-- Lunch -->
<div class="bg-[#0B0B0B] border border-[#242424] rounded-lg p-md flex justify-between items-center hover:border-surface-tint/15 transition-colors cursor-pointer">
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface">Lunch</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">1 item</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">650 kcal</span>
</div>
<!-- Snack -->
<div class="bg-[#0B0B0B] border border-[#242424] rounded-lg p-md flex justify-between items-center hover:border-surface-tint/15 transition-colors cursor-pointer">
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface">Snack</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">2 items</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">250 kcal</span>
</div>
<!-- Dinner -->
<div class="bg-[#0B0B0B] border border-[#242424] rounded-lg p-md flex justify-between items-center hover:border-surface-tint/15 transition-colors cursor-pointer opacity-70">
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface">Dinner</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Add meal</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface-variant">-- kcal</span>
</div>
</section>
</main>
<!-- Floating Action Button -->
<button class="fixed bottom-[100px] right-6 md:right-[calc(50%-180px)] w-14 h-14 bg-on-surface text-primary-container rounded-full flex items-center justify-center shadow-[0_10px_40px_rgba(0,0,0,0.5)] hover:scale-105 transition-transform z-40">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
<!-- BottomNavBar -->
<nav class="bg-surface-container-low dark:bg-surface-container-low border-t border-outline-variant dark:border-outline-variant bg-surface-container-low fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-lg py-md pb-safe md:hidden">
<!-- Home (Active) -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary scale-110 active:scale-90 duration-200 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-caps text-[10px] mt-1">Home</span>
</button>
<!-- Search -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-60 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined">search</span>
<span class="font-label-caps text-[10px] mt-1">Search</span>
</button>
<!-- Favorites -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-60 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined">star</span>
<span class="font-label-caps text-[10px] mt-1">Favorites</span>
</button>
<!-- AI -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-60 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined">mic</span>
<span class="font-label-caps text-[10px] mt-1">AI</span>
</button>
<!-- Settings -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-60 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-caps text-[10px] mt-1">Settings</span>
</button>
</nav>
<!-- Desktop Sidebar/Nav Placeholder for structural integrity, hidden on mobile -->
<nav class="hidden md:flex flex-col fixed left-0 top-0 h-full w-[200px] border-r border-[#242424] bg-[#0B0B0B] p-lg">
<div class="text-headline-md font-headline-md font-semibold tracking-tight text-on-surface mb-xl">Aura Nutrition</div>
<div class="flex flex-col gap-md">
<button class="flex items-center gap-sm text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-caps uppercase">Home</span>
</button>
<button class="flex items-center gap-sm text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">search</span>
<span class="font-label-caps uppercase">Search</span>
</button>
<button class="flex items-center gap-sm text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">star</span>
<span class="font-label-caps uppercase">Favorites</span>
</button>
<button class="flex items-center gap-sm text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">mic</span>
<span class="font-label-caps uppercase">AI</span>
</button>
<button class="flex items-center gap-sm text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity mt-auto">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-caps uppercase">Settings</span>
</button>
</div>
</nav>
<script>
        // Trigger progress ring animation on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                const ring = document.querySelector('.progress-ring');
                if(ring) ring.classList.add('loaded');
            }, 100);
        });
    </script>
</body></html>
