<style>
        /* Custom styles for high-end minimal feel */
        body {
            background-color: #000000;
        }
        .input-minimal {
            background-color: rgba(17, 17, 17, 0.8);
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .input-minimal:focus {
            border-bottom: 1px solid #ffffff;
            outline: none;
            box-shadow: none;
            background-color: rgba(26, 28, 28, 0.9);
        }
        .input-minimal::placeholder {
            color: #757575;
        }
    </style>

<body class="bg-[#000000] text-on-surface antialiased min-h-screen flex flex-col items-center justify-center font-body-lg">
<!-- Container for mobile-width content centered -->
<main class="w-full max-w-[430px] px-lg py-xl flex flex-col justify-center min-h-[1024px]">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-xl w-full text-center">
<span class="material-symbols-outlined text-[48px] text-on-surface mb-lg" data-icon="eco">eco</span>
<h1 class="font-display-data text-display-data text-on-surface mb-sm tracking-tighter">Welcome Back</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Sign in to continue to Aura Nutrition.</p>
</div>
<!-- Login Form -->
<form action="#" class="w-full flex flex-col gap-md" id="login-form" method="POST">
<div class="flex flex-col gap-xs relative">
<label class="sr-only" for="email">Email address</label>
<input class="input-minimal w-full px-md py-lg rounded-xl text-on-surface font-body-lg appearance-none" id="email" name="email" placeholder="Email address" required="" type="email"/>
</div>
<div class="flex flex-col gap-xs relative">
<label class="sr-only" for="password">Password</label>
<div class="relative w-full">
<input class="input-minimal w-full px-md py-lg rounded-xl text-on-surface font-body-lg appearance-none pr-[50px]" id="password" name="password" placeholder="Password" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" id="toggle-password" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-sm mb-lg">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-[#FFFFFF] text-[#000000] font-headline-md text-headline-md py-[18px] rounded-[24px] hover:bg-opacity-90 transition-all duration-300 transform active:scale-[0.98] mt-sm flex items-center justify-center gap-sm" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="mt-xl text-center w-full">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-on-surface font-medium hover:underline underline-offset-4 ml-sm" href="#">Sign up</a>
</p>
</div>
</main>
<script>
        // Simple password toggle logic
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const iconSpan = this.querySelector('.material-symbols-outlined');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                iconSpan.textContent = 'visibility';
                iconSpan.setAttribute('data-icon', 'visibility');
            } else {
                passwordInput.type = 'password';
                iconSpan.textContent = 'visibility_off';
                iconSpan.setAttribute('data-icon', 'visibility_off');
            }
        });
    </script>
</body></html>
