<style>
        body {
            background-color: #121414;
            color: #F7F7F7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .food-card {
            border-bottom: 1px solid #242424;
            transition: background-color 0.2s ease;
        }
        
        .food-card:hover {
            background-color: theme('colors.surface-container-low');
        }

        .food-card:last-child {
            border-bottom: none;
        }
        
        .add-btn {
            border: 1px solid #242424;
            transition: all 0.2s ease;
        }
        
        .add-btn:hover {
            border-color: #F7F7F7;
            color: #F7F7F7;
        }
        
        .search-input {
            background-color: #1e2020;
            border-radius: 8px;
            border: 1px solid #242424;
        }

        .search-input:focus {
            outline: none;
            border-color: #F7F7F7;
        }
        
        /* Mobile specific adjustments to ensure single column fluid feel */
        @media (max-width: 768px) {
             .content-container {
                 max-width: 100%;
             }
        }

<body class="min-h-screen flex flex-col items-center pb-[80px]">
<!-- TopAppBar (Web & Mobile) -->
<header class="bg-[#121414] text-[#F7F7F7] full-width top-0 w-full z-50 sticky border-b border-[#242424]">
<div class="flex justify-between items-center w-full px-lg py-md max-w-container-max mx-auto h-[64px]">
<div class="text-headline-md font-headline-md font-semibold tracking-tight text-[#F7F7F7]">
                Aura Nutrition
            </div>
<div class="flex items-center gap-sm">
<button class="text-[#F7F7F7] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[430px] px-lg pt-xl pb-xl flex-grow flex flex-col gap-xl">
<!-- Search Header -->

<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-[#F7F7F7] mb-sm">Log Food</h1>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-[#7A7A7A]">search</span>
<input autofocus="" class="search-input w-full pl-xl pr-sm py-sm text-body-lg font-body-lg text-[#F7F7F7] placeholder:text-[#7A7A7A] focus:ring-0 transition-colors" placeholder="Search food..." type="text"/>
</div>
</section>
<!-- Search Results (Recent/Suggested initially) -->
<section class="w-full flex flex-col">
<h2 class="font-label-caps text-label-caps text-[#7A7A7A] mb-md uppercase">Recent &amp; Suggestions</h2>
<div class="flex flex-col bg-[#121414] rounded-lg border border-[#242424] overflow-hidden">
<!-- Food Card 1 -->
<div class="food-card flex items-center justify-between py-md px-md cursor-pointer group">
<div class="flex flex-col gap-xs">
<span class="font-body-lg text-body-lg text-[#F7F7F7] font-semibold">Avocado, Raw</span>
<div class="flex gap-sm items-center">
<span class="font-body-sm text-body-sm text-[#7A7A7A]">160 kcal</span>
<span class="w-[3px] h-[3px] rounded-full bg-[#7A7A7A]"></span>
<span class="font-body-sm text-body-sm text-[#7A7A7A]">2g Protein</span>
</div>
</div>
<button class="add-btn w-8 h-8 rounded-full flex items-center justify-center text-[#7A7A7A] bg-transparent">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
<!-- Food Card 2 -->
<div class="food-card flex items-center justify-between py-md px-md cursor-pointer group">
<div class="flex flex-col gap-xs">
<span class="font-body-lg text-body-lg text-[#F7F7F7] font-semibold">Grilled Chicken Breast</span>
<div class="flex gap-sm items-center">

<span class="font-body-sm text-body-sm text-[#7A7A7A]">31g Protein</span>

</div>
<button class="add-btn w-8 h-8 rounded-full flex items-center justify-center text-[#7A7A7A] bg-transparent">
<span class="material-symbols-outlined text-[20px]">add</span>

</div>
<!-- Food Card 3 -->
<div class="food-card flex items-center justify-between py-md px-md cursor-pointer group">

<span class="font-body-lg text-body-lg text-[#F7F7F7] font-semibold">Almonds, Dry Roasted</span>

</button>

<!-- Bottom Nav Spacer to prevent content overlapping on mobile -->
<div class="h-[80px] w-full md:hidden"></div>
<script>
        // Simple interaction for the search input to simulate focus
        const searchInput = document.querySelector('.search-input');
        const searchIcon = searchInput.previousElementSibling;

        searchInput.addEventListener('focus', () => {
            searchIcon.classList.remove('text-[#7A7A7A]');
            searchIcon.classList.add('text-[#F7F7F7]');
        });

        searchInput.addEventListener('blur', () => {
            searchIcon.classList.remove('text-[#F7F7F7]');
            searchIcon.classList.add('text-[#7A7A7A]');
        });
        
        // Simple add button animation
        const addButtons = document.querySelectorAll('.add-btn');
        addButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const icon = this.querySelector('span');
                icon.textContent = 'check';
                this.classList.add('bg-[#F7F7F7]', 'text-[#121414]', 'border-[#F7F7F7]');
                this.classList.remove('text-[#7A7A7A]', 'bg-transparent');
                
                setTimeout(() => {
                    icon.textContent = 'add';
                    this.classList.remove('bg-[#F7F7F7]', 'text-[#121414]', 'border-[#F7F7F7]');
                    this.classList.add('text-[#7A7A7A]', 'bg-transparent');
                }, 1000);
            });
        });
    </script>
